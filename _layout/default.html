<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>
    {{ page.title | default: site.title | escape }}
  </title>

  <meta
    name="description"
    content="{{ page.description | default: site.description | escape }}"
  >

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: #24292f;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Helvetica,
        Arial,
        sans-serif;
      font-size: 16px;
      line-height: 1.65;
    }

    main {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 28px 80px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      line-height: 1.25;
    }

    h2 {
      margin: 42px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #d0d7de;
      font-size: 1.45rem;
      line-height: 1.3;
    }

    h3 {
      margin: 30px 0 14px;
      font-size: 1.15rem;
      line-height: 1.35;
    }

    p {
      margin: 0 0 17px;
    }

    ul {
      margin: 0 0 20px;
      padding-left: 28px;
    }

    li {
      margin-bottom: 6px;
    }

    strong {
      font-weight: 600;
    }

    code {
      padding: 2px 5px;
      border-radius: 4px;
      background: #f6f8fa;
      font-family:
        ui-monospace,
        SFMono-Regular,
        Consolas,
        "Liberation Mono",
        monospace;
      font-size: 0.9em;
    }

    a {
      color: #0969da;
      text-decoration: none;
    }

    a:hover,
    a:focus {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      body {
        font-size: 15px;
      }

      main {
        padding: 28px 18px 52px;
      }

      h1 {
        font-size: 1.65rem;
      }

      h2 {
        margin-top: 34px;
        font-size: 1.25rem;
      }

      h3 {
        font-size: 1.08rem;
      }
    }
  </style>
</head>

<body>
  <main>
    {{ content }}
  </main>
</body>
</html>
